{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Social Media Website</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>


<nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(to right, #1e3c72, #2a5298); box-shadow: 0 2px 8px rgba(0,0,0,0.15);">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center fw-bold" href="{% url 'feed' %}">
      <img src="{% static 'img/logo.jpg' %}" width="36" height="36" class="me-2 rounded-circle">
      SocialSite
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNavbar">

      <ul class="navbar-nav me-auto ms-3">
        <li class="nav-item">
          <a class="nav-link fw-semibold" href="{% url 'feed' %}">Feed</a>
        </li>

        <li class="nav-item">
          <a class="nav-link fw-semibold" href="{% url 'profile' %}">Profile</a>
        </li>

        <li class="nav-item">
         <a class="nav-link fw-semibold" href="{% url 'stories_page' %}">Stories</a>
        </li>

        <li class="nav-item">
          <a class="nav-link fw-semibold" href="{% url 'chat_list' %}">Chat</a>
        </li>
      </ul>

      <span class="navbar-text text-white fw-semibold me-3">
        <i class="bi bi-person-circle me-1"></i>{{ request.user.username }}
      </span>

      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link fw-semibold" href="/accounts/login/">Login</a>
        </li>

        <li class="nav-item">
          <a class="nav-link fw-semibold" href="/accounts/logout/">Logout</a>
        </li>
      </ul>

    </div>
  </div>
</nav>


<div class="container mt-4">

    {% block content %}
    {% endblock %}

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="{% static 'js/main.js' %}"></script>

</body>
</html>
