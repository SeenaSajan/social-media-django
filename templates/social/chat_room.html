{% extends "base.html" %}

{% block content %}

<h4>Chat with {{ other_user.username }}</h4>

<div style="height:300px; overflow-y:auto; border:1px solid #ccc; padding:10px; margin-bottom:10px; background:#fafafa;">

    {% for msg in messages %}
        <div style="margin-bottom:10px; text-align:{% if msg.sender == request.user %}right{% else %}left{% endif %};">
            <span style="background:#f1f1f1; padding:6px 12px; border-radius:10px; display:inline-block;">
                {{ msg.text }}
            </span>
        </div>
    {% empty %}
        <p>No messages yet.</p>
    {% endfor %}

</div>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="message" class="form-control mb-2" placeholder="Type a message...">
    <button class="btn btn-primary">Send</button>
</form>

<a href="{% url 'chat_list' %}" class="btn btn-secondary mt-2">Back</a>

{% endblock %}
